<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Industrial Heater Coil Calculator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<main class="app-shell">

<header class="app-header">
  <h1>Industrial Heater Coil Calculator</h1>
  <p class="subtitle">ELECTRO GROUP OF INDUSTRIES</p>
</header>

<!-- MATERIAL SELECTION -->
<div id="materialSelect" class="choice-grid app-view">
  <button class="choice-btn" onclick="selectMaterial('nichrome')">Nichrome</button>
  <button class="choice-btn" onclick="selectMaterial('kanthal')">Kanthal D</button>
</div>

<!-- ACTION SELECTION -->
<div id="landing" class="panel hidden">

  <div class="material-bar">
    <span id="materialLabel"></span>
    <button class="back-btn" onclick="backToMaterial()">Back</button>
  </div>

  <div class="choice-grid">
    <button class="choice-btn" onclick="openCalculator()">Calculate Value</button>
    <button class="choice-btn" onclick="openPassword()">Edit Database</button>
  </div>

</div>

<!-- CALCULATOR -->
<div id="calculator" class="panel hidden">

  <div class="material-bar">
    <span id="materialLabelCalc"></span>
    <button class="back-btn" onclick="backToLanding()">Back</button>
  </div>

  <div class="form">

    <div class="form-field">
      <label>Wattage (W)</label>
      <input id="wattage" type="number" inputmode="decimal" placeholder="Enter wattage">
    </div>

    <div class="form-field">
      <label>Voltage (V)</label>
      <input id="voltage" type="number" inputmode="decimal" placeholder="Enter voltage">
    </div>

    <div class="form-field">
      <label>Heater OD (mm)</label>
      <input id="heaterOD" type="number" inputmode="decimal" placeholder="Enter heater diameter">
    </div>

    <div class="form-field">
      <label>Heater Length (mm)</label>
      <input id="heaterLength" type="number" inputmode="decimal" placeholder="Total heater length">
    </div>

    <div class="form-field">
      <label>Core Length (mm)</label>
      <input id="coreLength" type="number" inputmode="decimal" placeholder="Winding length">
    </div>

    <div class="form-field">
      <label>Pipe Thickness (mm)</label>
      <div class="field-inline">
        <input id="pipeThickness" type="number" inputmode="decimal" step="0.1" placeholder="Auto">
        <label class="switch">
          <input type="checkbox" id="autoThickness" checked onchange="toggleAutoThickness()"> Auto
        </label>
      </div>
    </div>

    <div class="form-field">
      <label>Pipe OD (mm)</label>
      <div class="field-inline">
        <input id="pipeOD" type="number" inputmode="decimal" step="0.1" placeholder="Auto">
        <label class="switch">
          <input type="checkbox" id="autoPipeOD" checked onchange="toggleAutoPipeOD()"> Auto
        </label>
      </div>
    </div>

    <div class="form-field form-field--wide">
      <label>Core OD (mm)</label>
      <div class="field-inline">
        <input id="coreOD" type="number" inputmode="decimal" step="0.1" placeholder="Auto">
        <label class="switch">
          <input type="checkbox" id="autoCoreOD" checked onchange="toggleAutoCoreOD()"> Auto
        </label>
      </div>
      <div id="coreODStatus" class="core-od-status"></div>
    </div>

    <div class="form-field">
      <label>Extra Resistance (%)</label>
      <input id="extra" type="number" inputmode="decimal" value="0">
    </div>

  </div>

  <button class="primary-action" onclick="calculate()">Calculate</button>

  <div id="result"></div>

</div>

<!-- PASSWORD MODAL -->
<div id="passwordModal" class="modal hidden">
  <div class="modal-box">
    <h3>Enter Admin Password</h3>
    <input type="password" id="dbPassword">
    <button class="primary-action" onclick="checkPassword()">Enter</button>
    <button class="secondary-action" onclick="closePassword()">Cancel</button>
    <p id="passError"></p>
  </div>
</div>

<!-- SAVE STATUS MODAL -->
<div id="saveModal" class="modal hidden">
  <div class="modal-box">
    <h3 id="saveTitle">Status</h3>
    <p id="saveMessage"></p>
    <button class="primary-action" onclick="closeSaveModal()">OK</button>
  </div>
</div>

<!-- DATABASE EDITOR -->
<div id="dbEditor" class="panel hidden">

  <div class="material-bar">
    <h3 id="dbTitle">Edit Database</h3>
    <button class="back-btn" onclick="backToLanding()">Back</button>
  </div>

  <div class="table-wrapper">
    <table id="dbTable"></table>
  </div>

  <button id="saveBtn" class="primary-action" onclick="saveDatabase()">Save Changes</button>

</div>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script.js"></script>

</body>
</html>
